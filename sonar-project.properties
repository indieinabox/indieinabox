# Configuração do projeto SonarQube / SonarCloud
sonar.projectKey=lumenpink_indieinabox
sonar.projectName=Indieinabox
sonar.projectVersion=1.0

# Diretórios de código-fonte
sonar.sources=app,bootstrap,build.php
sonar.tests=tests

# Exclusões (vendor, arquivos legados não gerenciados)
sonar.exclusions=\
  vendor/**,\
  app/Yaml.php,\
  app/functions/parsedown.php,\
  app/functions/beautify-html.php,\
  app/functions/HtmlMinifier.php

# Cobertura de testes (gerada pelo Pest/PHPUnit com Xdebug)
sonar.php.coverage.reportPaths=coverage/clover.xml

# Relatório do Psalm (SARIF → importado como issues externos)
sonar.externalIssuesReportPaths=coverage/psalm.json

# Encoding
sonar.sourceEncoding=UTF-8

# Versão do PHP para análise
sonar.php.version=8.4
