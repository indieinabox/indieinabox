name: CI

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "develop"]

# Cancel concurrent runs on the same branch (except main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint + Unit tests (Matrix PHP 8.2 → 8.4)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "PHP ${{ matrix.php }} — Tests & Lint"
    runs-on: ubuntu-latest
    # container:
    #   image: thecodingmachine/php:8.4-v4-cli
    strategy:
      fail-fast: true          # Stop at the first error in any version
      matrix:
        php: ["8.4"]

    steps:
      - name: "Checkout (full history for Psalm)"
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: "Setup PHP ${{ matrix.php }}"
        uses: https://github.com/shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, fileinfo, pdo_sqlite, sqlite3
          coverage: xdebug          # Required to generate clover
          tools: composer:v2

      - name: "Cache vendor & tools"
        id: cache-vendor
        uses: https://github.com/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            vendor
            .phpcs-cache
            .psalm-cache
          key: vendor-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            vendor-php${{ matrix.php }}-

      - name: "Install Composer dependencies"
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --no-progress

      # ── Security ────────────────────────────────────────────────────────────
      - name: "composer audit — Known vulnerabilities"
        # Substitute for roave/security-advisories (conflicts with pest v3)
        run: composer audit --format=plain

      # ── PHP Version Compatibility ────────────────────────────────────────
      - name: "PHP Compatibility Sniffer (8.2 - 8.4)"
        run: |
          composer sniffer

      # ── Create dummy database config for tests ───────────────────────────
      - name: "Setup test database"
        run: |
          mkdir -p data
          echo "<?php return ['db_path' => __DIR__ . '/data/indieinabox.sqlite'];" > .config.php
          php -r '$db = new PDO("sqlite:" . __DIR__ . "/data/indieinabox.sqlite"); $db->exec(file_get_contents("database.sql"));'

      # ── Bundle compilation (required for test:compiled) ─────────────────
      - name: "Compile bundle (php compile.php)"
        run: php compile.php

      # ── PEST Tests ──────────────────────────────────────────────────────────
      - name: "PEST — Standard suite (source) + Clover coverage"
        run: |
          mkdir -p coverage
          ./vendor/bin/pest \
            --coverage-clover coverage/clover.xml \
            --log-junit coverage/junit.xml

      - name: "PEST — Compiled suite"
        run: |
          TEST_COMPILED=true ./vendor/bin/pest

      # ── Coverage artifacts ───────────────────────────────────────────────
      - name: "Upload Clover report"
        if: matrix.php == '8.4'          # Avoid duplicate uploads
        uses: https://github.com/actions/upload-artifact@a8a3f3ad30e3422c9c7b888a15615d19a852ae32 # v3.1.3
        with:
          name: coverage-clover
          path: coverage/clover.xml
          retention-days: 7

      - name: "Upload JUnit report"
        if: matrix.php == '8.4'
        uses: https://github.com/actions/upload-artifact@a8a3f3ad30e3422c9c7b888a15615d19a852ae32 # v3.1.3
        with:
          name: coverage-junit
          path: coverage/junit.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Static security analysis with Psalm
  # ─────────────────────────────────────────────────────────────────────────────
  psalm:
    name: "Psalm — Static Security Analysis"
    runs-on: ubuntu-latest
    needs: test           # Only runs if tests pass

    steps:
      - uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: https://github.com/shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: mbstring, json, fileinfo, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: "Cache vendor & tools"
        id: cache-vendor
        uses: https://github.com/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            vendor
            .phpcs-cache
            .psalm-cache
          key: vendor-php8.4-${{ hashFiles('composer.lock') }}
          restore-keys: |
            vendor-php8.4-

      - name: "Install dependencies"
        run: |
          composer install --no-interaction --prefer-dist --no-progress

      - name: "Psalm — Analysis (taints + errors)"
        run: |
          mkdir -p coverage
          ./vendor/bin/psalm \
            --config=psalm.xml \
            --taint-analysis \
            --report=coverage/psalm.json \
            --report-show-info=true \
            --no-progress \
            --output-format=github   # Native PR annotations

      - name: "Upload Psalm report (JSON)"
        if: always()
        uses: https://github.com/actions/upload-artifact@a8a3f3ad30e3422c9c7b888a15615d19a852ae32 # v3.1.3
        with:
          name: psalm-report
          path: coverage/psalm.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — OWASP Dependency-Check (CVEs in transitive dependencies)
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-check:
    name: "OWASP Dependency-Check"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Cache NVD (speeds up subsequent scans)"
        uses: https://github.com/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.dependency-check/data
          key: nvd-${{ github.run_id }}
          restore-keys: |
            nvd-

      - name: "Run OWASP Dependency-Check"
        uses: https://github.com/dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # v1.1.0
        id: depcheck
        with:
          project: "indieinabox"
          path: "."
          format: "HTML SARIF"
          out: "coverage/dependency-check"
          # CVSS >= 7 fails the build (adjust according to risk policy)
          args: >
            --failOnCVSS 7
            --enableRetired
            --exclude "**/vendor/**"

      - name: "Upload Dependency-Check report"
        if: always()
        uses: https://github.com/actions/upload-artifact@a8a3f3ad30e3422c9c7b888a15615d19a852ae32 # v3.1.3
        with:
          name: dependency-check-report
          path: coverage/dependency-check
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — SonarQube / SonarCloud
  # Depends on previous jobs to have reports available
  # ─────────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: "SonarQube Analysis"
    runs-on: ubuntu-latest
    needs: [test, psalm]      # Requires coverage and Psalm reports
    # Only runs on main branch or PRs (avoids running on feature branches without SONAR_TOKEN)
    if: github.actor != 'dependabot[bot]'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: "Verify SONAR_TOKEN"
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::warning::SONAR_TOKEN not configured. Skipping SonarQube analysis."
          fi

      - uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: env.SONAR_TOKEN != ''
        with:
          fetch-depth: 0   # Required for blame and history in Sonar

      - name: "Download Clover report"
        if: env.SONAR_TOKEN != ''
        uses: https://github.com/actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a # v3.0.2
        with:
          name: coverage-clover
          path: coverage

      - name: "Download Psalm report"
        if: env.SONAR_TOKEN != ''
        uses: https://github.com/actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a # v3.0.2
        with:
          name: psalm-report
          path: coverage

      # ── Option A: SonarCloud (Free SaaS for open source) ─────────────────
      - name: "SonarCloud Scan"
        if: env.SONAR_TOKEN != ''
        uses: https://github.com/SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'indieinabox_indieinabox' }}
            -Dsonar.organization=${{ vars.SONAR_ORG || 'indieinabox' }}
            -Dsonar.php.coverage.reportPaths=coverage/clover.xml
            -Dsonar.externalIssuesReportPaths=coverage/psalm.json

      # ── Option B: SonarQube ubuntu-latest (uncomment if preferred) ──────────────
      # - name: "SonarQube Scan (ubuntu-latest)"
      #   if: env.SONAR_TOKEN != ''
      #   uses: https://github.com/SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      #   env:
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Nightly Release (only on main branch after tests pass)
  # ─────────────────────────────────────────────────────────────────────────────
  nightly-release:
    name: "Nightly Release"
    runs-on: ubuntu-latest
    needs: [test, psalm]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Setup PHP
        uses: https://github.com/shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, json, fileinfo, pdo_sqlite, sqlite3
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev

      - name: Compile App
        run: php compile.php

      - name: Rename Artifact
        run: mv indieinabox.php index.php

      - name: Generate Date Tag
        id: date
        run: echo "DATED_TAG=nightly-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Move Nightly Tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Move the rolling 'nightly' tag to the current commit
          git tag -f nightly
          git push -f origin nightly
          
          # Create the dated nightly tag
          git tag -f ${{ steps.date.outputs.DATED_TAG }}
          git push -f origin ${{ steps.date.outputs.DATED_TAG }}

      - name: Delete Existing Nightly Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ env.GITHUB_API_URL || 'https://codeberg.org/api/v1' }}
          REPO: ${{ github.repository }}
        run: |
          REL_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL/repos/$REPO/releases/tags/nightly" | jq -r '.id // empty')
          if [ -n "$REL_ID" ] && [ "$REL_ID" != "null" ]; then
            echo "Deleting existing nightly release ID: $REL_ID to prevent asset update 404"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" "$API_URL/repos/$REPO/releases/$REL_ID"
          fi

      - name: Create Dated Nightly Release
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.date.outputs.DATED_TAG }}"
          name: "Nightly Build (${{ steps.date.outputs.DATED_TAG }})"
          prerelease: true
          files: index.php
          body: "Automatic nightly build from main."

      - name: Create or Update Nightly Release
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          tag_name: "nightly"
          name: "Nightly Build"
          prerelease: true
          files: index.php
          body: "Automatic nightly build from main."

      - name: Clean Old Nightlies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # In Forgejo/Gitea, GITHUB_API_URL is automatically set to /api/v1 of the instance
          API_URL: ${{ env.GITHUB_API_URL || 'https://codeberg.org/api/v1' }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch all releases
          RELEASES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL/repos/$REPO/releases")
          
          # Extract release IDs for tags starting with "nightly-2" (ignoring the main "nightly" tag)
          # Sort them descending (newest first based on tag name YYYYMMDD)
          # Keep the first 5, delete the rest
          echo "$RELEASES" | jq -r '.[] | select(.tag_name | startswith("nightly-2")) | "\(.tag_name) \(.id)"' | sort -r > all_nightlies.txt
          
          echo "All dated nightlies found:"
          cat all_nightlies.txt
          
          # Skip the first 4 (since the new one makes 5, we keep 5 total)
          # 'tail -n +6' prints from line 6 onwards.
          tail -n +6 all_nightlies.txt | while read -r TAG_NAME REL_ID; do
            echo "Deleting old nightly release: $TAG_NAME (ID: $REL_ID)"
            # Delete Release via API
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" "$API_URL/repos/$REPO/releases/$REL_ID"
            # Delete Git Tag
            git push --delete origin "$TAG_NAME" || true
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 6 — Stable Release (only on tags after tests pass)
  # ─────────────────────────────────────────────────────────────────────────────
  stable-release:
    name: "Stable Release"
    runs-on: ubuntu-latest
    needs: [test, psalm]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Setup PHP
        uses: https://github.com/shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, json, fileinfo, pdo_sqlite, sqlite3
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev

      - name: Compile App
        run: php compile.php

      - name: Rename Artifact
        run: mv indieinabox.php index.php

      - name: Create Stable Release
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          prerelease: false
          files: index.php
