name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: "Build and Release"
    runs-on: codeberg-tiny
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Setup PHP
        uses: https://github.com/shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, json, fileinfo, pdo_sqlite, sqlite3
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev

      - name: Compile App
        run: php compile.php

      - name: Rename Artifact
        run: mv indieinabox.php index.php

      - name: Create Nightly Release
        if: github.ref == 'refs/heads/main'
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          tag_name: "nightly-${{ github.run_id }}"
          name: "Nightly #${{ github.run_number }}"
          prerelease: true
          files: index.php
          body: "Automatic nightly build from main."

      - name: Create Stable Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          prerelease: false
          files: index.php
